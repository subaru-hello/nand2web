<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="nand2web">
  <title>nand2web</title>
  <!-- zinc-950 background -->
  <rect width="32" height="32" rx="6" fill="#09090b"/>
  <!-- NAND gate glyph: flat-left body + arc right + bubble -->
  <!-- gate body: rect left side -->
  <rect x="5" y="9" width="12" height="14" rx="1" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- arc right side of gate body -->
  <path d="M17 9 Q26 16 17 23" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- output bubble (inversion) -->
  <circle cx="28" cy="16" r="2" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- output line -->
  <line x1="30" y1="16" x2="32" y2="16" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- input lines -->
  <line x1="0" y1="12" x2="5" y2="12" stroke="#0ea5e9" stroke-width="1.5"/>
  <line x1="0" y1="20" x2="5" y2="20" stroke="#0ea5e9" stroke-width="1.5"/>
</svg>
